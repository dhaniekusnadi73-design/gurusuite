services:
  - type: web
    name: gurusuite
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PIN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_BANK
        value: BSI
      - key: PAYMENT_ACCOUNT_NUMBER
        value: "7567057270"
      - key: PAYMENT_ACCOUNT_NAME
        value: Dhanie Kusnadi
      - key: ADMIN_EMAIL
        value: dhaniekusnadi73@guru.sd.belajar.id
    disk:
      name: gurusuite-data
      mountPath: /var/data
      sizeGB: 1
